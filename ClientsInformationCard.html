    <script>
      var mode     = "<?= mode ?>";
      var clientId = "<?= clientId ?>";
      var baseUrl  = "<?= baseUrl ?>";

      var REQUIRED_FIELDS = ["projectName", "currency", "typeOfDays", "daysForPayment",
                             "pmAm", "companyName", "invoiceTemplate", "ourCompany"];

      // ── Helpers ──────────────────────────────────────────────────────────────

      function esc(str) {
        if (!str) return "";
        return String(str)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      // Robust navigation that works inside the Apps Script iframe sandbox.
      // Relative URLs navigate the inner sandbox frame (blank page), so we
      // target the top window with the absolute web-app URL (like Invoices).
      function navigateTo(query) {
        var target = baseUrl + query;
        try { window.top.location.href = target; return; } catch (e) {}
        try { window.location.href = target; return; } catch (e2) {}
      }

      function setButtonBusy(button, busyText) {
        if (!button) return;
        button.disabled = true;
        button.classList.add("disabled");
        button.setAttribute("aria-disabled", "true");
        button.setAttribute("data-original-html", button.innerHTML);
        button.innerHTML =
          '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>' +
          esc(busyText || "Loading...");
      }

      function navigateToListWithSpinner(button) {
        setButtonBusy(button, "Loading...");
        navigateTo("?page=ClientsInformationList");
      }

      function setFormDisabled(disabled) {
        document.querySelectorAll("#card-form input, #card-form select, #card-form textarea")
          .forEach(function (el) {
            if (el.id === "projectName" && !disabled) return; // keep selects enabled when editing
            el.disabled = disabled;
          });
      }

      function setViewMode() {
        document.querySelectorAll("#card-form input, #card-form select, #card-form textarea")
          .forEach(function (el) {
            el.setAttribute("readonly", "readonly");
            el.disabled = true;
            el.classList.add("view-mode-field");
          });
      }

      function populateSelect(id, options, currentValue) {
        var sel = document.getElementById(id);
        if (!sel) return;
        var existing = sel.querySelector('option[value=""]');
        options.forEach(function (val) {
          if (!val) return;
          var opt = document.createElement("option");
          opt.value = val;
          opt.textContent = val;
          if (val === currentValue) opt.selected = true;
          sel.appendChild(opt);
        });
        // if currentValue not in list, add it temporarily
        if (currentValue && !options.includes(currentValue)) {
          var opt = document.createElement("option");
          opt.value = currentValue;
          opt.textContent = currentValue;
          opt.selected = true;
          sel.insertBefore(opt, existing ? existing.nextSibling : sel.firstChild);
        }
      }

      function fillField(id, value) {
        var el = document.getElementById(id);
        if (!el) return;
        if (el.tagName === "SELECT") {
          // try to match option
          var found = false;
          for (var i = 0; i < el.options.length; i++) {
            if (el.options[i].value === value) { el.selectedIndex = i; found = true; break; }
          }
          if (!found && value) {
            var opt = document.createElement("option");
            opt.value = value; opt.textContent = value; opt.selected = true;
            el.appendChild(opt);
          }
        } else if (el.tagName === "TEXTAREA") {
          el.value = value || "";
        } else {
          el.value = value || "";
        }
      }

      function collectFormData() {
        var data = {};
        ["projectName","linkFinFolder","linkSalesFolder","linkRates",
         "currency","typeOfDays","daysForPayment","pmAm",
         "companyName","companyNumberVat","number","companyAddress",
         "vatRate","bankChoice1","bankChoice2","invoiceTemplate","ourCompany",
         "mailTo","mailAddressTo","copyMailClient","copyMailSloboda","comments"
        ].forEach(function (id) {
          var el = document.getElementById(id);
          data[id] = el ? el.value.trim() : "";
        });
        return data;
      }

      function validateForm() {
        var errors = [];
        var fieldLabels = {
          projectName:   "Project name",
          currency:      "Currency for accounting",
          typeOfDays:    "Type of days for payment",
          daysForPayment:"Days for payment",
          pmAm:          "Project manager / account manager",
          companyName:   "Company name",
          invoiceTemplate: "Invoice template",
          ourCompany:    "Our company",
        };

        REQUIRED_FIELDS.forEach(function (id) {
          var el = document.getElementById(id);
          if (!el) return;
          if (!el.value || el.value.trim() === "") {
            el.classList.add("is-invalid");
            errors.push((fieldLabels[id] || id) + " is required.");
          } else {
            el.classList.remove("is-invalid");
          }
        });

        var alert = document.getElementById("validation-alert");
        if (errors.length > 0) {
          alert.innerHTML = "<strong>Please fill in required fields:</strong><ul class='mb-0 mt-1'>"
            + errors.map(function (e) { return "<li>" + esc(e) + "</li>"; }).join("") + "</ul>";
          alert.classList.remove("d-none");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return false;
        }
        alert.classList.add("d-none");
        return true;
      }

      // ── Dropdowns ────────────────────────────────────────────────────────────

      function loadDropdowns(currentData) {
        google.script.run
          .withSuccessHandler(function (opts) {
            var cur = currentData || {};
            populateSelect("projectName",      opts.projectList     || [], cur.projectName);
            populateSelect("currency",         opts.currencies      || [], cur.currency);
            populateSelect("typeOfDays",       opts.typeOfDays      || [], cur.typeOfDays);
            populateSelect("pmAm",             opts.pmAmList        || [], cur.pmAm);
            populateSelect("companyNumberVat", opts.companyNumbers  || [], cur.companyNumberVat);
            populateSelect("vatRate",          opts.vatRates        || [], cur.vatRate);
            populateSelect("bankChoice1",      opts.bankOptions     || [], cur.bankChoice1);
            populateSelect("bankChoice2",      opts.bankOptions     || [], cur.bankChoice2);
            populateSelect("invoiceTemplate",  opts.invoiceTemplates|| [], cur.invoiceTemplate);
            populateSelect("ourCompany",       opts.ourCompanies    || [], cur.ourCompany);
          })
          .withFailureHandler(function (err) {
            console.error("Failed to load dropdowns:", err);
          })
          .getClientsInformationDropdowns();
      }

      // ── Render buttons ───────────────────────────────────────────────────────

      function renderButtons(m) {
        var container = document.getElementById("action-buttons");
        container.innerHTML = "";

        function btn(label, cls, onclick, id) {
          var b = document.createElement("button");
          b.type = "button";
          b.className = "btn " + cls;
          b.textContent = label;
          if (id) b.id = id;
          b.addEventListener("click", onclick);
          container.appendChild(b);
          return b;
        }

        if (m === "create") {
          btn("Save", "btn-success", submitCreate, "save-btn");
          btn("Cancel", "btn-outline-secondary", function () { navigateTo("?page=ClientsInformationList"); });
        } else if (m === "edit") {
          btn("Confirm", "btn-success", submitUpdate, "confirm-btn");
          btn("Cancel", "btn-outline-secondary", function () { navigateTo("?page=ClientsInformationList"); }, "cancel-btn");
        } else if (m === "view") {
          btn("Edit", "btn-primary", function () {
            navigateTo("?page=ClientsInformationCard&id=" + clientId + "&mode=edit");
          });
          btn("Copy", "btn-outline-secondary", function () {
            navigateTo("?page=ClientsInformationCard&id=" + clientId + "&mode=copy");
          });
          btn("Delete", "btn-outline-danger", function () {
            navigateTo("?page=ClientsInformationCard&id=" + clientId + "&mode=delete");
          });
          btn("Back to list", "btn-outline-secondary", function () {
            navigateToListWithSpinner(this);
          }, "back-to-list-btn");
        } else if (m === "copy") {
          btn("Save as new", "btn-success", submitCreate, "save-btn");
          btn("Cancel", "btn-outline-secondary", function () { navigateTo("?page=ClientsInformationList"); });
        } else if (m === "delete") {
          btn("Confirm Delete", "btn-danger", submitDelete, "delete-btn");
          btn("Cancel", "btn-outline-secondary", function () {
            navigateTo("?page=ClientsInformationCard&id=" + clientId + "&mode=view");
          });
        }
      }

      // ── Submit handlers ──────────────────────────────────────────────────────

      function setActionBusy(activeButtonId, busyText) {
        document.querySelectorAll("#action-buttons button").forEach(function (b) { b.disabled = true; });
        var activeButton = document.getElementById(activeButtonId);
        if (!activeButton) return;
        activeButton.setAttribute("data-original-html", activeButton.innerHTML);
        activeButton.innerHTML =
          '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>' +
          esc(busyText || "Processing...");
      }

      function clearActionBusy(activeButtonId) {
        var activeButton = document.getElementById(activeButtonId);
        if (activeButton) {
          var originalHtml = activeButton.getAttribute("data-original-html");
          if (originalHtml !== null) {
            activeButton.innerHTML = originalHtml;
            activeButton.removeAttribute("data-original-html");
          }
        }
        document.querySelectorAll("#action-buttons button").forEach(function (b) { b.disabled = false; });
      }

      function submitCreate() {
        if (!validateForm()) return;
        setActionBusy("save-btn", "Saving...");
        var formData = collectFormData();
        google.script.run
          .withSuccessHandler(function (result) {
            if (result && result.success) {
              document.getElementById("result").innerHTML =
                '<div class="alert alert-success"><i class="bi bi-check-circle-fill me-2"></i>Client card saved successfully!</div>' +
                '<button type="button" class="btn btn-primary" id="back-to-list-after-save">Back to list</button>';
              document.getElementById("action-buttons").innerHTML = "";
              document.getElementById("back-to-list-after-save").addEventListener("click", function () {
                navigateToListWithSpinner(this);
              });
            } else {
              document.getElementById("result").innerHTML =
                '<div class="alert alert-danger">Error: ' + esc((result && result.message) || "Unknown error") + '</div>';
              clearActionBusy("save-btn");
            }
          })
          .withFailureHandler(function (err) {
            document.getElementById("result").innerHTML =
              '<div class="alert alert-danger">Error: ' + esc(String(err)) + '</div>';
            clearActionBusy("save-btn");
          })
          .saveClientCard(formData);
      }

      function submitUpdate() {
        if (!validateForm()) return;
        setActionBusy("confirm-btn", "Saving...");
        var formData = collectFormData();
        formData.id = clientId;
        google.script.run
          .withSuccessHandler(function (result) {
            if (result && result.success) {
              document.getElementById("result").innerHTML =
                '<div class="alert alert-success"><i class="bi bi-check-circle-fill me-2"></i>Client card updated successfully!</div>' +
                '<button type="button" class="btn btn-primary me-2" id="back-to-list-after-update">Back to list</button>' +
                '<a href="' + baseUrl + '?page=ClientsInformationCard&id=' + clientId + '&mode=view" target="_top" class="btn btn-outline-secondary">View card</a>';
              document.getElementById("action-buttons").innerHTML = "";
              document.getElementById("back-to-list-after-update").addEventListener("click", function () {
                navigateToListWithSpinner(this);
              });
            } else {
              document.getElementById("result").innerHTML =
                '<div class="alert alert-danger">Error: ' + esc((result && result.message) || "Unknown error") + '</div>';
              clearActionBusy("confirm-btn");
            }
          })
          .withFailureHandler(function (err) {
            document.getElementById("result").innerHTML =
              '<div class="alert alert-danger">Error: ' + esc(String(err)) + '</div>';
            clearActionBusy("confirm-btn");
          })
          .updateClientCard(formData);
      }

      function submitDelete() {
        setActionBusy("delete-btn", "Deleting...");
        google.script.run
          .withSuccessHandler(function (result) {
            if (result && result.success) {
              document.querySelectorAll("#card-form .form-section").forEach(function (section) {
                section.style.display = "none";
              });
              document.getElementById("result").innerHTML =
                '<div class="alert alert-success"><i class="bi bi-check-circle-fill me-2"></i>Client record deleted successfully.</div>' +
                '<button type="button" class="btn btn-primary" id="back-to-list-after-delete">Back to list</button>';
              document.getElementById("action-buttons").innerHTML = "";
              document.getElementById("back-to-list-after-delete").addEventListener("click", function () {
                navigateToListWithSpinner(this);
              });
            } else {
              document.getElementById("result").innerHTML =
                '<div class="alert alert-danger">Error: ' + esc((result && result.message) || "Unknown error") + '</div>';
              clearActionBusy("delete-btn");
            }
          })
          .withFailureHandler(function (err) {
            document.getElementById("result").innerHTML =
              '<div class="alert alert-danger">Error: ' + esc(String(err)) + '</div>';
            clearActionBusy("delete-btn");
          })
          .deleteClientCard(clientId);
      }

      // ── Fill form from data object ────────────────────────────────────────────

      function fillForm(data) {
        ["projectName","linkFinFolder","linkSalesFolder","linkRates",
         "currency","typeOfDays","daysForPayment","pmAm",
         "companyName","companyNumberVat","number","companyAddress",
         "vatRate","bankChoice1","bankChoice2","invoiceTemplate","ourCompany",
         "mailTo","mailAddressTo","copyMailClient","copyMailSloboda","comments"
        ].forEach(function (id) {
          fillField(id, data[id] || "");
        });
      }

      // ── Init ──────────────────────────────────────────────────────────────────

      document.addEventListener("DOMContentLoaded", function () {
        var titles = {
          create: "New Client Card",
          view:   "Client Card — View",
          edit:   "Client Card — Edit",
          copy:   "Client Card — Copy",
          delete: "Client Card — Delete",
        };
        document.getElementById("page-title").textContent = titles[mode] || "Client Card";

        renderButtons(mode);

        if (mode === "create") {
          document.getElementById("loading-spinner").style.display = "none";
          document.getElementById("card-form").style.display = "";
          loadDropdowns(null);
          return;
        }

        // For view / edit / copy / delete — load existing data first
        if (!clientId) {
          document.getElementById("card-form").style.display = "";
          document.getElementById("result").innerHTML =
            '<div class="alert alert-danger">No client ID provided.</div>';
          return;
        }

        document.getElementById("loading-spinner").style.display = "";

        google.script.run
          .withSuccessHandler(function (data) {
            document.getElementById("loading-spinner").style.display = "none";
            document.getElementById("card-form").style.display = "";

            if (!data || data._error) {
              document.getElementById("result").innerHTML =
                '<div class="alert alert-danger">' + esc((data && data._message) || "Client not found.") + '</div>';
              return;
            }

            // Load dropdowns first, then fill fields so selected values are preserved
            google.script.run
              .withSuccessHandler(function (opts) {
                populateSelect("projectName",      opts.projectList     || [], data.projectName);
                populateSelect("currency",         opts.currencies      || [], data.currency);
                populateSelect("typeOfDays",       opts.typeOfDays      || [], data.typeOfDays);
                populateSelect("pmAm",             opts.pmAmList        || [], data.pmAm);
                populateSelect("companyNumberVat", opts.companyNumbers  || [], data.companyNumberVat);
                populateSelect("vatRate",          opts.vatRates        || [], data.vatRate);
                populateSelect("bankChoice1",      opts.bankOptions     || [], data.bankChoice1);
                populateSelect("bankChoice2",      opts.bankOptions     || [], data.bankChoice2);
                populateSelect("invoiceTemplate",  opts.invoiceTemplates|| [], data.invoiceTemplate);
                populateSelect("ourCompany",       opts.ourCompanies    || [], data.ourCompany);

                // Fill remaining plain-text fields
                ["linkFinFolder","linkSalesFolder","linkRates",
                 "daysForPayment","companyName","number","companyAddress",
                 "mailTo","mailAddressTo","copyMailClient","copyMailSloboda","comments"
                ].forEach(function (id) { fillField(id, data[id] || ""); });

                if (mode === "view" || mode === "delete") {
                  setViewMode();
                }
                if (mode === "delete") {
                  document.getElementById("result").innerHTML =
                    '<div class="alert alert-warning"><i class="bi bi-exclamation-triangle-fill me-2"></i>' +
                    'You are about to permanently delete this client record. This action cannot be undone.</div>';
                }
              })
              .withFailureHandler(function () {
                fillForm(data);
                if (mode === "view" || mode === "delete") setViewMode();
              })
              .getClientsInformationDropdowns();
          })
          .withFailureHandler(function (err) {
            document.getElementById("loading-spinner").style.display = "none";
            document.getElementById("card-form").style.display = "";
            document.getElementById("result").innerHTML =
              '<div class="alert alert-danger">Error loading client: ' + esc(String(err)) + '</div>';
          })
          .getClientCardById(clientId);
      });
    </script>
  </body>
</html>
