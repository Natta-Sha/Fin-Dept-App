              Confirm

    <script>
      var BASE_URL = "<?= baseUrl ?>";
      var billId = "<?= billId ?>";
      var mode = "<?= mode ?>" || "create";
      var MAX_ROWS = 10;
      var currentRows = 1;
      var isEU = false;

      function safeNavigateToBillsList() {
        var target = BASE_URL + "?page=BillsList";
        try {
          window.top.location.href = target;
          return;
        } catch (e) {}
        try {
          window.location.href = target;
          return;
        } catch (e2) {}
        if (
          typeof google !== "undefined" &&
          google.script &&
          google.script.host &&
          google.script.host.close
        ) {
          google.script.host.close();
        }
      }

      function goToBillsList() {
        safeNavigateToBillsList();
      }

      function switchToBillMode(newMode) {
        var id = (billId || "").toString().trim();
        if (id) {
          var target =
            BASE_URL +
            "?page=BillGenerator&id=" +
            encodeURIComponent(id) +
            "&mode=" +
            encodeURIComponent(newMode);
          try {
            window.top.location.href = target;
            return;
          } catch (e) {
            window.location.href = target;
            return;
          }
        }
        mode = newMode;
        updateUIForMode();
      }

      function copyBill() {
        switchToBillMode("copy");
      }

      function editBill() {
        switchToBillMode("edit");
      }

      function confirmDeleteBill() {
        var id = (billId || "").toString().trim();
        if (!id) {
          alert("Bill ID not found.");
          return;
        }

        var mainContent = document.querySelector(".main-content");
        if (!mainContent) return;

        var viewBtns = document.getElementById("view-buttons");
        var deleteBtns = document.getElementById("delete-buttons");
        var billForm = document.getElementById("bill-form");
        if (billForm) billForm.style.display = "none";
        if (viewBtns) viewBtns.style.display = "none";
        if (deleteBtns) deleteBtns.style.display = "none";

        mainContent.innerHTML =
          '<div class="col-12 text-center py-5">' +
          '<div class="spinner-border text-primary" role="status">' +
          '<span class="visually-hidden">Deleting...</span></div>' +
          '<p class="mt-3">Deleting bill...</p></div>';

        google.script.run
          .withSuccessHandler(function (result) {
            if (result && result.success) {
              mainContent.innerHTML =
                '<div class="text-center py-5">' +
                '<div class="alert alert-success d-inline-block" role="alert">' +
                '<i class="bi bi-check-circle-fill me-2"></i>' +
                "Bill deleted successfully!" +
                "</div>" +
                '<div class="mt-4">' +
                '<button type="button" class="btn btn-primary px-4 fw-bold" onclick="safeNavigateToBillsList()">' +
                '<i class="bi bi-arrow-left me-2"></i>Back to the list</button>' +
                "</div></div>";
            } else {
              var msg =
                (result && result.message) ? String(result.message) : "Could not delete the bill.";
              mainContent.innerHTML =
                '<div class="text-center py-5">' +
                '<div class="alert alert-danger d-inline-block" role="alert">' +
                '<i class="bi bi-exclamation-circle-fill me-2"></i>' +
                "Error: " +
                msg.replace(/</g, "&lt;").replace(/>/g, "&gt;") +
                "</div>" +
                '<div class="mt-4">' +
                '<button type="button" class="btn btn-primary px-4 fw-bold" onclick="safeNavigateToBillsList()">' +
                '<i class="bi bi-arrow-left me-2"></i>Back to the list</button>' +
                "</div></div>";
            }
          })
          .withFailureHandler(function (error) {
            var errText = String(error).replace(/</g, "&lt;").replace(/>/g, "&gt;");
            mainContent.innerHTML =
              '<div class="text-center py-5">' +
              '<div class="alert alert-danger d-inline-block" role="alert">' +
              '<i class="bi bi-exclamation-circle-fill me-2"></i>' +
              "Error: " +
              errText +
              "</div>" +
              '<div class="mt-4">' +
              '<button type="button" class="btn btn-primary px-4 fw-bold" onclick="safeNavigateToBillsList()">' +
              '<i class="bi bi-arrow-left me-2"></i>Back to the list</button>' +
              "</div></div>";
          })
          .deleteBillById(id);
      }

      // Parse numeric value: accept both dot and comma, return float
      function parseNum(str) {
        if (!str) return 0;
        return parseFloat(String(str).replace(",", ".")) || 0;
      }

      // Format number to 2 decimal places with dot separator
      function fmt2(n) {
        return n.toFixed(2);
      }

      // --- Conditional fields ---

      function onEUChange() {
        isEU = document.getElementById("isContractorEU").value === "yes";
        document.getElementById("vatIdRow").style.display = isEU ? "" : "none";
        document.getElementById("vatRateRow").style.display = isEU ? "" : "none";
        document.getElementById("vatAmountRow").style.display = isEU ? "" : "none";
        var vatIdInput = document.getElementById("contractorVatId");
        var vatRateInput = document.getElementById("vatRate");
        if (isEU) {
          vatIdInput.setAttribute("required", "required");
          vatRateInput.setAttribute("required", "required");
        } else {
          vatIdInput.removeAttribute("required");
          vatRateInput.removeAttribute("required");
          vatIdInput.value = "";
          document.getElementById("vatRate").value = "";
        }
        recalcTotals();
      }

      function onDueDateChange() {
        document.getElementById("dueDateRow").style.display =
          document.getElementById("yesNoDueDate").value === "yes" ? "" : "none";
      }

      function onAccountTypeChange() {
        var hasType = document.getElementById("accountType").value !== "";
        document.getElementById("bankCodeRow").style.display = hasType ? "" : "none";
        var bankCodeInput = document.getElementById("bankCode");
        if (hasType) {
          bankCodeInput.setAttribute("required", "required");
        } else {
          bankCodeInput.removeAttribute("required");
          bankCodeInput.value = "";
        }
      }

      // --- Services table ---

      function updateAddRowButton() {
        var btn = document.getElementById("add-row-btn");
        btn.disabled = currentRows >= MAX_ROWS;
      }

      function addServiceRow() {
        if (currentRows >= MAX_ROWS) return;
        currentRows++;
        var tbody = document.getElementById("servicesBody");
        var tr = document.createElement("tr");
        tr.setAttribute("data-row", currentRows);
        tr.innerHTML =
          '<td class="text-center align-middle">' + currentRows + '</td>' +
          '<td><input type="text" class="form-control svc-services" name="services_' + currentRows + '" /></td>' +
          '<td><input type="text" class="form-control svc-period" name="period_' + currentRows + '" /></td>' +
          '<td><input type="text" class="form-control svc-hours svc-num" name="hours_' + currentRows + '" inputmode="decimal" placeholder="0.00" /></td>' +
          '<td><input type="text" class="form-control svc-rate svc-num" name="rate_' + currentRows + '" inputmode="decimal" placeholder="0.00" /></td>' +
          '<td><input type="text" class="form-control svc-amount svc-num" name="amount_' + currentRows + '" placeholder="0.00" /></td>' +
          '<td class="text-center align-middle"><button type="button" class="icon-button remove-svc-row" title="Remove"><i class="bi bi-trash text-danger"></i></button></td>';
        tbody.appendChild(tr);
        updateRemoveButtons();
        updateAddRowButton();
        attachRowListeners(tr);
        syncRowAmountState(tr);
      }

      function removeServiceRow(btn) {
        var row = btn.closest("tr");
        if (row) {
          row.remove();
          currentRows--;
          renumberRows();
          updateRemoveButtons();
          updateAddRowButton();
          recalcTotals();
        }
      }

      function renumberRows() {
        var rows = document.querySelectorAll("#servicesBody tr");
        rows.forEach(function (row, idx) {
          var num = idx + 1;
          row.setAttribute("data-row", num);
          row.querySelector("td:first-child").textContent = num;
          row.querySelector(".svc-services").name = "services_" + num;
          row.querySelector(".svc-period").name = "period_" + num;
          row.querySelector(".svc-hours").name = "hours_" + num;
          row.querySelector(".svc-rate").name = "rate_" + num;
          row.querySelector(".svc-amount").name = "amount_" + num;
        });
      }

      function updateRemoveButtons() {
        var rows = document.querySelectorAll("#servicesBody tr");
        rows.forEach(function (row) {
          var btn = row.querySelector(".remove-svc-row");
          if (btn) btn.disabled = rows.length <= 1;
        });
      }

      function rowHasHoursAndRateForCalc(row) {
        var h = row.querySelector(".svc-hours");
        var r = row.querySelector(".svc-rate");
        return h && r && h.value.trim() !== "" && r.value.trim() !== "";
      }

      function syncRowAmountState(row) {
        var amt = row.querySelector(".svc-amount");
        if (!amt) return;
        if (rowHasHoursAndRateForCalc(row)) {
          amt.readOnly = true;
          calcRowAmount(row);
        } else {
          amt.readOnly = false;
        }
      }

      function calcRowAmount(row) {
        if (!rowHasHoursAndRateForCalc(row)) return;
        var hours = parseNum(row.querySelector(".svc-hours").value);
        var rate = parseNum(row.querySelector(".svc-rate").value);
        row.querySelector(".svc-amount").value = fmt2(hours * rate);
      }

      function recalcTotals() {
        var subtotal = 0;
        document.querySelectorAll("#servicesBody tr").forEach(function (row) {
          subtotal += parseNum(row.querySelector(".svc-amount").value);
        });
        document.getElementById("subtotal").value = fmt2(subtotal);

        var vatRate = parseNum(document.getElementById("vatRate").value);
        var vatAmount = isEU ? (subtotal * vatRate) / 100 : 0;
        document.getElementById("vatAmount").value = fmt2(vatAmount);
        document.getElementById("totalAmount").value = fmt2(subtotal + vatAmount);
      }

      function attachRowListeners(row) {
        var hours = row.querySelector(".svc-hours");
        var rate = row.querySelector(".svc-rate");
        var amount = row.querySelector(".svc-amount");
        if (hours) {
          hours.addEventListener("input", function () {
            syncRowAmountState(row);
            recalcTotals();
          });
        }
        if (rate) {
          rate.addEventListener("input", function () {
            syncRowAmountState(row);
            recalcTotals();
          });
        }
        if (amount) {
          amount.addEventListener("input", function () {
            recalcTotals();
          });
        }
      }

      // Format on blur: ensure 2 decimal places
      function formatOnBlur(input) {
        var v = parseNum(input.value);
        if (input.value.trim() !== "") {
          input.value = fmt2(v);
        }
      }

      function formatHoursOnBlur(input) {
        var t = input.value.trim();
        if (t === "") return;
        var n = parseNum(t);
        if (Math.abs(n - Math.round(n)) < 1e-9) {
          input.value = String(Math.round(n));
        } else {
          input.value = n.toFixed(10).replace(/\.?0+$/, "");
        }
      }

      function attachBlurFormat(row) {
        var hours = row.querySelector(".svc-hours");
        var rate = row.querySelector(".svc-rate");
        var amount = row.querySelector(".svc-amount");
        if (hours) hours.addEventListener("blur", function () { formatHoursOnBlur(hours); });
        if (rate) rate.addEventListener("blur", function () { formatOnBlur(rate); });
        if (amount) amount.addEventListener("blur", function () { formatOnBlur(amount); });
      }

      function fillDropdownKeepValue(id, options) {
        var sel = document.getElementById(id);
        if (!sel) return;
        var current = sel.value;
        sel.innerHTML = '<option value="">Select...</option>';
        if (options && options.length) {
          options.forEach(function (val) {
            var opt = document.createElement("option");
            opt.value = val;
            opt.textContent = val;
            if (val === current) opt.selected = true;
            sel.appendChild(opt);
          });
        }
        if (current && !Array.from(sel.options).some(function (o) { return o.value === current; })) {
          var extra = document.createElement("option");
          extra.value = current;
          extra.textContent = current;
          extra.selected = true;
          sel.appendChild(extra);
        }
      }

        var result = document.getElementById("result");
        result.innerHTML =

      function validateForm() {
        var required = [
          { id: "pe", label: "PE" },
          { id: "contractorName", label: "Contractor's name" },
          { id: "contractorId", label: "Contractor's ID" },
          { id: "contractorAddress", label: "Contractor's address" },
          { id: "isContractorEU", label: "Is Contractor from EU?" },
          { id: "currency", label: "Currency" },
          { id: "bankAccountNumber", label: "Bank account number" },
          { id: "bankName", label: "Bank name" },
          { id: "invoiceNumber", label: "Invoice number" },
          { id: "agreementNumber", label: "Agreement number" },
          { id: "invoiceDate", label: "Invoice date" },
          { id: "yesNoDueDate", label: "Is due date necessary?" },
        ];

        if (isEU) {
          required.push({ id: "contractorVatId", label: "Contractor's VAT ID" });
          required.push({ id: "vatRate", label: "VAT rate (%)" });
        }

        if (document.getElementById("accountType").value !== "") {
          required.push({ id: "bankCode", label: "Bank code" });
        }

        var errors = [];
        required.forEach(function (f) {
          var el = document.getElementById(f.id);
          if (!el || !el.value.trim()) {
            errors.push(f.label + " is required.");
            if (el) el.classList.add("is-invalid");
          } else {
            if (el) el.classList.remove("is-invalid");
          }
        });

        // At least one service row must have Services filled
        var hasService = false;
        document.querySelectorAll("#servicesBody tr").forEach(function (row) {
          if (row.querySelector(".svc-services").value.trim() !== "") hasService = true;
        });
        if (!hasService) {
          errors.push("At least one row in Services table must be filled (Services field).");
        }

        if (errors.length > 0) {
          showValidationError(errors);
          return false;
        }
        clearValidationError();
        return true;
      }

      function fmtView2(val) {
        if (!val && val !== 0) return "";
        var n = parseNum(val);
        return n === 0 && String(val).trim() === "" ? "" : fmt2(n);
      }

      function fmtViewHours(val) {
        if (val === "" || val === null || val === undefined) return "";
        var n = parseNum(val);
        if (String(val).trim() === "" && n === 0) return "";
        if (Math.abs(n - Math.round(n)) < 1e-9) return String(Math.round(n));
        return n.toFixed(10).replace(/\.?0+$/, "");
      }

      function fmtViewInt(val) {
        if (!val && val !== 0) return "";
        var n = parseInt(val, 10);
        return isNaN(n) ? String(val) : String(n);
      }

        });
        document.getElementById("bill-form").addEventListener("change", function (e) {
          if (e.target.classList.contains("is-invalid")) {
            e.target.classList.remove("is-invalid");
          }
          clearValidationError();
        });

        document.getElementById("servicesBody").addEventListener("click", function (e) {
          if (e.target.closest(".remove-svc-row")) {
            removeServiceRow(e.target.closest(".remove-svc-row"));
          }
        });

        document.getElementById("vatRate").addEventListener("input", recalcTotals);

        // Set UI for mode immediately (hide/show correct buttons)
        updateUIForMode();

        // View / Edit / Copy mode: load data (and dropdowns in parallel for edit/copy)
        if ((mode === "view" || mode === "edit" || mode === "copy") && billId) {
          document.getElementById("bill-form").style.display = "none";
          document.getElementById("loading-spinner").style.display = "";

          var isEditOrCopy = (mode === "edit" || mode === "copy");
          var parallelState = { billData: null, dropdownData: null, billError: null, billDone: false, dropdownDone: false };

          function tryFinishParallel() {
            if (!isEditOrCopy) return;
            if (!parallelState.billDone || !parallelState.dropdownDone) return;
            document.getElementById("loading-spinner").style.display = "none";
            document.getElementById("bill-form").style.display = "";
            if (parallelState.billError) {
              document.getElementById("result").innerHTML =
                '<div class="alert alert-danger">Error loading bill: ' + parallelState.billError + '</div>';
              return;
            }
            fillBillFormEditMode(parallelState.billData, parallelState.dropdownData);
          }

          google.script.run
            .withSuccessHandler(function (data) {
              if (isEditOrCopy) {
                parallelState.billData = data;
                parallelState.billDone = true;
                tryFinishParallel();
              } else {
                document.getElementById("loading-spinner").style.display = "none";
                document.getElementById("bill-form").style.display = "";
                fillBillFormViewMode(data);
              }
            })
            .withFailureHandler(function (err) {
              if (isEditOrCopy) {
                parallelState.billError = err;
                parallelState.billDone = true;
                tryFinishParallel();
              } else {
                document.getElementById("loading-spinner").style.display = "none";
                document.getElementById("bill-form").style.display = "";
                document.getElementById("result").innerHTML =
                  '<div class="alert alert-danger">Error loading bill: ' + err + '</div>';
              }
            })
            .getBillDataById(billId);

          if (isEditOrCopy) {
            google.script.run
              .withSuccessHandler(function (data) {
                parallelState.dropdownData = data;
                parallelState.dropdownDone = true;
                tryFinishParallel();
              })
              .withFailureHandler(function () {
                parallelState.dropdownData = null;
                parallelState.dropdownDone = true;
                tryFinishParallel();
              })
              .getBillDropdownOptions();
          }
          return;
        }

        // Create mode: load dropdowns
        loadDropdownOptions();

        var firstRow = document.querySelector("#servicesBody tr");
        if (firstRow) {
          attachRowListeners(firstRow);
          attachBlurFormat(firstRow);
          syncRowAmountState(firstRow);
        }

        var origAdd = addServiceRow;
        addServiceRow = function () {
          origAdd();
          var rows = document.querySelectorAll("#servicesBody tr");
          attachBlurFormat(rows[rows.length - 1]);
        };
      });
    </script>
  </body>
</html>
