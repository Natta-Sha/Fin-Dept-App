    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css" />

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>

      .btn:hover { transform: translateY(-1px) !important; box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important; }

      .btn-outline-secondary {

      .btn-outline-secondary:hover { background: linear-gradient(135deg,#6c757d,#495057) !important; color: white !important; }
      .btn-outline-danger {

      .btn-outline-success {

      /* Table */
      .dataTables_wrapper {
        overflow-x: auto;
      }
      table.dataTable {
        white-space: nowrap;

      }
      table.dataTable th, table.dataTable td {
        padding: 4px 7px !important;

      table.dataTable thead th {
        text-align: center !important;
        background: #f8f9fa;

      thead input {
        width: 100%;

      table.dataTable tbody tr:hover { background: #f0f4ff !important; }

      /* Keep header background opaque while it stays fixed during vertical scroll */
      .dataTables_scrollHead, .dataTables_scrollHead table thead th {
        background: #f8f9fa !important;

      .table-link {

    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <?!= getNavigation(activePage) ?>

    <div class="main-content container-xl">
      <div class="mb-3 d-flex justify-content-start">
        <a href="<?= baseUrl ?>?page=ClientsInformationCard&mode=create" class="btn btn-nav">
          Create new
        </a>
      </div>

      <h2 class="mb-3">Clients Information</h2>

      <div id="table-wrapper">
        <table id="clientsInfoTable" class="display table table-bordered" style="width:100%; display:none;">
          <thead class="table-light"></thead>
          <tbody></tbody>
        </table>
      </div>

      <script>
        var baseUrl = "<?= baseUrl ?>";

        // Header names (as they appear in the Information sheet) that need special rendering
        var PROJECT_HEADER = "Project name *";
        var LINK_HEADERS = {
          "Link to Fin folder":      { icon: "bi-folder2-open",       title: "Fin Folder" },
          "Link to Sales folder":    { icon: "bi-folder",             title: "Sales Folder" },
          "Link to file with rates": { icon: "bi-file-earmark-text",  title: "Rates File" }
        };

        function escHtml(str) {
          if (!str) return "";
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function iconLink(url, iconClass, title) {
          if (!url) return "";
          return '<a href="' + escHtml(url) + '" target="_blank" class="icon-link" title="' + title + '"><i class="bi ' + iconClass + '"></i></a>';
        }

        function viewUrl(id) {
          return baseUrl + "?page=ClientsInformationCard&id=" + encodeURIComponent(id) + "&mode=view";
        }

        function buildActions(id) {
          var eid = encodeURIComponent(id);
          return (
            '<a href="' + baseUrl + '?page=ClientsInformationCard&id=' + eid + '&mode=edit"   class="btn btn-sm btn-outline-secondary me-1">Edit</a>' +
            '<a href="' + baseUrl + '?page=ClientsInformationCard&id=' + eid + '&mode=delete" class="btn btn-sm btn-outline-danger me-1">Delete</a>' +
            '<a href="' + baseUrl + '?page=ClientsInformationCard&id=' + eid + '&mode=copy"   class="btn btn-sm btn-outline-success">Copy</a>'
          );
        }

        $(document).ready(function () {
          google.script.run
            .withSuccessHandler(function (resp) {
              var headers = (resp && resp.headers) || [];
              var rows = (resp && resp.rows) || [];

              buildTable(headers, rows);
            })
            .withFailureHandler(function (err) {
              console.error("Error loading clients information list:", err);
              document.getElementById("clientsInfoTable").style.display = "";
            })
            .getClientsInformationList();
        });

        function buildTable(headers, rows) {
          var thead = $("#clientsInfoTable thead");
          var tbody = $("#clientsInfoTable tbody");
          thead.empty();
          tbody.empty();

          // Header row + Actions column at the end
          var headRow = $("<tr></tr>");
          headers.forEach(function (h) {
            headRow.append($("<th></th>").text(h));
          });
          headRow.append($("<th></th>").text("Actions"));
          thead.append(headRow);

          // Filter row (one input per data column; none for Actions)
          var filterRow = $("<tr></tr>");
          headers.forEach(function () {
            filterRow.append('<th><input type="text" placeholder="Search" /></th>');
          });
          filterRow.append("<th></th>");
          thead.append(filterRow);

          // Body rows
          rows.forEach(function (row) {
            var tr = $("<tr></tr>");
            headers.forEach(function (h, idx) {
              var value = row.cells[idx] || "";
              var html;
              if (h === PROJECT_HEADER) {
                html = value
                  ? '<a href="' + viewUrl(row.id) + '" class="table-link">' + escHtml(value) + "</a>"
                  : "";
              } else if (LINK_HEADERS[h]) {
                html = iconLink(value, LINK_HEADERS[h].icon, LINK_HEADERS[h].title);
              } else {
                html = escHtml(value);
              }
              tr.append($("<td></td>").html(html));
            });
            tr.append($("<td></td>").addClass("actions-cell").html(buildActions(row.id)));
            tbody.append(tr);
          });

          var actionsIdx = headers.length; // last column

          // IMPORTANT: the table must be visible BEFORE initializing DataTable,
          // otherwise scrollX/scrollY measure zero widths and the (cloned) header
          // renders blank.
          document.getElementById("clientsInfoTable").style.display = "";

          var table = $("#clientsInfoTable").DataTable({
            dom: "lrtip",
            orderCellsTop: true,
            scrollX: true,          // horizontal scroll for many columns
            scrollY: "60vh",        // vertical scroll keeps the header fixed
            scrollCollapse: true,
            paging: true,
            autoWidth: false,
            columnDefs: [
              { targets: actionsIdx, orderable: false, className: "dt-body-center dt-head-center actions-cell", width: "170px" },
              { targets: "_all", className: "dt-body-left dt-head-center" },
            ],
          });

          // Wire per-column search inputs (filter row = second header row).
          // In scroll mode DataTables clones the header into a separate container,
          // so bind to the API's header element (the visible clone), not the original.
          $(table.table().header()).find("tr:eq(1) th").each(function (i) {
            $("input", this).on("keyup change", function () {
              if (table.column(i).search() !== this.value) {
                table.column(i).search(this.value).draw();
              }
            });
          });

          // Recalculate column/header widths after layout settles and on resize
          setTimeout(function () { table.columns.adjust(); }, 0);
          $(window).on("resize", function () { table.columns.adjust(); });
        }
      </script>

      <!-- Deleted success modal -->
      <div class="modal fade" id="deletedModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Record Deleted</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">The client record was deleted successfully.</div>
          </div>
        </div>
      </div>

      <script>
        $(function () {
          var params = new URLSearchParams(window.location.search);
          if (params.get("deleted") === "1") {
            var modal = new bootstrap.Modal(document.getElementById("deletedModal"));
            modal.show();
          }
        });
      </script>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var tooltips = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltips.map(function (el) { return new bootstrap.Tooltip(el); });
      });
    </script>
  </body>
</html>
