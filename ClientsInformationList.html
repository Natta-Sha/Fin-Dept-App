    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <?!= getNavigation(activePage) ?>

    <div class="main-content container-xl">
      <div class="mb-3 d-flex justify-content-start">
        <a href="<?= baseUrl ?>?page=ClientsInformationCard&mode=create" class="btn btn-nav">
          Create new
        </a>
      </div>

      <h2 class="mb-3">Clients Information</h2>

      <div id="table-wrapper">
        <table id="clientsInfoTable" class="display table table-bordered" style="width:100%; display:none;">
          <thead class="table-light"></thead>
          <tbody></tbody>
        </table>
      </div>

      <script>
        var baseUrl = "<?= baseUrl ?>";

        // Header names (as they appear in the Information sheet) that need special rendering
        var PROJECT_HEADER = "Project name *";
        var LINK_HEADERS = {
          "Link to Fin folder":      { icon: "bi-folder2-open",       title: "Fin Folder" },
          "Link to Sales folder":    { icon: "bi-folder",             title: "Sales Folder" },
          "Link to file with rates": { icon: "bi-file-earmark-text",  title: "Rates File" }
        };

        function escHtml(str) {
          if (!str) return "";
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function iconLink(url, iconClass, title) {
          if (!url) return "";
          return '<a href="' + escHtml(url) + '" target="_blank" class="icon-link" title="' + title + '"><i class="bi ' + iconClass + '"></i></a>';
        }

        function viewUrl(id) {
          return baseUrl + "?page=ClientsInformationCard&id=" + encodeURIComponent(id) + "&mode=view";
        }

        function buildActions(id) {
          var eid = encodeURIComponent(id);
          return (
            '<a href="' + baseUrl + '?page=ClientsInformationCard&id=' + eid + '&mode=edit"   class="btn btn-sm btn-outline-secondary me-1">Edit</a>' +
            '<a href="' + baseUrl + '?page=ClientsInformationCard&id=' + eid + '&mode=delete" class="btn btn-sm btn-outline-danger me-1">Delete</a>' +
            '<a href="' + baseUrl + '?page=ClientsInformationCard&id=' + eid + '&mode=copy"   class="btn btn-sm btn-outline-success">Copy</a>'
          );
        }

        function columnClassForHeader(header) {
          var classes = [];
          if (header === PROJECT_HEADER) classes.push("col-sticky");
          if (LINK_HEADERS[header]) return "col-link";
          if (header === "Currency for accounting *") classes.push("col-currency");
          if (header === "Type of days for payment *") classes.push("col-days-type");
          if (header === "Days for payment *") classes.push("col-days-payment");
          if (
            header === "Company address" ||
            header === "Mail to" ||
            header === "Copy mail (client)" ||
            header === "Copy mail (Sloboda)"
          ) {
            classes.push("col-wide-text");
          }
          return classes.join(" ");
        }

        function formatDisplayValue(header, value) {
          if (header !== "VAT rate") return value;
          if (value === "" || value === null || value === undefined) return "";
          var raw = String(value).trim();
          if (raw.indexOf("%") !== -1) return raw;
          var num = parseFloat(raw.replace(",", "."));
          if (isNaN(num)) return raw;
          var percent = Math.abs(num) <= 1 ? num * 100 : num;
          var rounded = Math.round(percent * 100) / 100;
          return (Math.abs(rounded - Math.round(rounded)) < 1e-9
            ? String(Math.round(rounded))
            : rounded.toFixed(2).replace(/\.?0+$/, "")) + "%";
        }

        $(document).ready(function () {
          google.script.run
            .withSuccessHandler(function (resp) {
              var headers = (resp && resp.headers) || [];
              var rows = (resp && resp.rows) || [];

              buildTable(headers, rows);
            })
            .withFailureHandler(function (err) {
              console.error("Error loading clients information list:", err);
              document.getElementById("clientsInfoTable").style.display = "";
            })
            .getClientsInformationList();
        });

        function buildTable(headers, rows) {
          var thead = $("#clientsInfoTable thead");
          var tbody = $("#clientsInfoTable tbody");
          thead.empty();
          tbody.empty();

          // Header row + Actions column at the end
          var headRow = $("<tr></tr>");
          headers.forEach(function (h) {
            headRow.append($("<th></th>").addClass(columnClassForHeader(h)).text(h));
          });
          headRow.append($("<th></th>").addClass("actions-cell").text("Actions"));
          thead.append(headRow);

          // Filter row (one input per data column; none for Actions)
          var filterRow = $("<tr></tr>");
          headers.forEach(function (h, idx) {
            filterRow.append(
              $("<th></th>")
                .addClass(columnClassForHeader(h))
                .append('<input type="text" placeholder="Search" data-col-index="' + idx + '" />')
            );
          });
          filterRow.append('<th class="actions-cell"></th>');
          thead.append(filterRow);

          // Body rows
          rows.forEach(function (row) {
            var tr = $("<tr></tr>");
            headers.forEach(function (h, idx) {
              var value = formatDisplayValue(h, row.cells[idx] || "");
              var html;
              if (h === PROJECT_HEADER) {
                html = value
                  ? '<a href="' + viewUrl(row.id) + '" class="table-link">' + escHtml(value) + "</a>"
                  : "";
              } else if (LINK_HEADERS[h]) {
                html = iconLink(value, LINK_HEADERS[h].icon, LINK_HEADERS[h].title);
              } else {
                html = escHtml(value);
              }
              tr.append($("<td></td>").addClass(columnClassForHeader(h)).html(html));
            });
            tr.append($("<td></td>").addClass("actions-cell").html(buildActions(row.id)));
            tbody.append(tr);
          });

          var actionsIdx = headers.length; // last column

          document.getElementById("clientsInfoTable").style.display = "";

          // Native DataTables scrolling + FixedColumns:
          // scrollX/scrollY keeps the header aligned with the body, and
          // FixedColumns freezes Project name * (the first visible column).
          var table = $("#clientsInfoTable").DataTable({
            dom: "lrtip",
            orderCellsTop: true,
            scrollX: true,
            scrollY: "65vh",
            scrollCollapse: true,
            paging: true,
            autoWidth: false,
            fixedColumns: {
              left: 1,
              leftColumns: 1
            },
            columnDefs: [
              { targets: actionsIdx, orderable: false, className: "dt-body-center dt-head-center actions-cell", width: "230px" },
              { targets: "_all", className: "dt-body-left dt-head-center" },
            ],
            initComplete: function () {
              var api = this.api();
              var container = $(api.table().container());

              // DataTables + FixedColumns creates cloned headers. The cloned
              // filter inputs keep data-col-index, so every input can address
              // the same real DataTables column and stay visually in sync.
              container
                .off("keyup.dtClientFilters change.dtClientFilters", "thead tr:eq(1) input")
                .on("keyup.dtClientFilters change.dtClientFilters", "thead tr:eq(1) input", function () {
                  var input = this;
                  var i = Number(input.getAttribute("data-col-index"));
                  if (isNaN(i)) return;

                  container
                    .find('thead tr:eq(1) input[data-col-index="' + i + '"]')
                    .not(input)
                    .val(input.value);

                  if (api.column(i).search() !== input.value) {
                    api.column(i).search(input.value).draw();
                  }
                });

              api.columns.adjust();
              if (api.fixedColumns && api.fixedColumns().relayout) {
                api.fixedColumns().relayout();
              }
            }
          });

          setTimeout(function () {
            table.columns.adjust();
            if (table.fixedColumns && table.fixedColumns().relayout) {
              table.fixedColumns().relayout();
            }
          }, 0);

          table.on("draw.dt column-sizing.dt", function () {
            if (table.fixedColumns && table.fixedColumns().relayout) {
              table.fixedColumns().relayout();
            }
          });
        }
      </script>

      <!-- Deleted success modal -->
      <div class="modal fade" id="deletedModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Record Deleted</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">The client record was deleted successfully.</div>
          </div>
        </div>
      </div>

      <script>
        $(function () {
          var params = new URLSearchParams(window.location.search);
          if (params.get("deleted") === "1") {
            var modal = new bootstrap.Modal(document.getElementById("deletedModal"));
            modal.show();
          }
        });
      </script>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var tooltips = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        tooltips.map(function (el) { return new bootstrap.Tooltip(el); });
      });
    </script>
  </body>
</html>
